<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Off Store | Pan-India Gear</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .hidden-product { display: none !important; }
    </style>
</head>
<body class="pb-20">

    <nav class="bg-white border-b sticky top-0 z-50 p-4 space-y-3">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-black text-white px-2 py-1 rounded font-black text-sm">OFF</div>
                <h1 class="font-black text-lg tracking-tighter">THE OFF STORE</h1>
            </div>
            <button onclick="window.location.href='history.html'" class="text-[10px] font-black text-blue-600 bg-blue-50 px-3 py-1.5 rounded-full uppercase">My Orders</button>
        </div>
        <input type="text" id="searchInput" onkeyup="searchItems()" placeholder="Search 140+ items..." class="w-full bg-gray-100 rounded-2xl py-3 px-5 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-600">
    </nav>

    <main class="p-4 grid grid-cols-2 gap-4" id="productGrid">
        <div class="product-card bg-white p-3 rounded-[2.5rem] border shadow-sm space-y-3" data-name="10-in-1 emergency puncture kit">
            <div class="aspect-square rounded-[2rem] overflow-hidden">
                <img src="https://images.unsplash.com/photo-1486006920555-c77dcf18193c?q=80&w=1000&auto=format&fit=crop" class="w-full h-full object-cover">
            </div>
            <div class="px-1">
                <h3 class="font-bold text-xs text-gray-800 h-8 line-clamp-2">10-in-1 Emergency Puncture Kit</h3>
                <div class="flex items-center justify-between mt-2">
                    <span class="font-black text-blue-600">₹599</span>
                    <div class="flex items-center bg-gray-100 rounded-full px-2 py-1 gap-2">
                        <button onclick="changeQty('qty-1', -1)" class="text-xs font-bold">-</button>
                        <span id="qty-1" class="text-[10px] font-black">1</span>
                        <button onclick="changeQty('qty-1', 1)" class="text-xs font-bold">+</button>
                    </div>
                </div>
                <button onclick="initBuy('KIT', 'Puncture Kit', 599, 'qty-1')" class="w-full mt-3 bg-black text-white text-[10px] font-black py-2.5 rounded-full uppercase">Buy Now</button>
            </div>
        </div>
    </main>

    <footer class="p-10 bg-white border-t mt-10 space-y-6">
        <div class="grid grid-cols-2 gap-4 text-[10px] font-black uppercase text-gray-400">
            <a href="privacy.html">Privacy</a>
            <a href="shipping.html">Shipping & Refund</a>
            <a href="terms.html">T&C</a>
            <a href="https://wa.me/918917228811" class="text-green-600">WhatsApp Us</a>
        </div>
        <p class="text-[9px] font-bold text-gray-300">© 2026 THE OFF STORE • ODISHA</p>
    </footer>

    <script>
        function changeQty(id, delta) {
            let el = document.getElementById(id);
            let val = parseInt(el.innerText) + delta;
            if(val > 0) el.innerText = val;
        }

        function initBuy(prefix, name, price, qtyId) {
            const qty = parseInt(document.getElementById(qtyId).innerText);
            const orderId = `OFF-${prefix}-${Date.now().toString().slice(-6)}`;
            const data = { id: orderId, name: name, price: price, qty: qty, total: price * qty };
            localStorage.setItem('pendingOrder', JSON.stringify(data));
            window.location.href = 'checkout.html';
        }

        function searchItems() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('product-card');
            for (let card of cards) {
                let name = card.getAttribute('data-name');
                card.style.display = name.includes(input) ? "block" : "none";
            }
        }
    </script>
</body>
</html>

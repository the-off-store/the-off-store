<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Off Store | Official</title>
    <style>
        :root { --bg: #f8f9fa; --card: #fff; --primary: #222; --accent: #28a745; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); }
        
        header { background: var(--primary); color: white; padding: 2rem 1rem; text-align: center; }
        
        /* Search Bar Style */
        .search-container { max-width: 600px; margin: -25px auto 30px; position: relative; z-index: 10; }
        #search-input { 
            width: 100%; padding: 15px 25px; border-radius: 30px; border: 1px solid #ddd;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-size: 1rem; outline: none;
        }

        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .category-section { margin-bottom: 50px; display: none; }
        .category-title { font-size: 1.8rem; border-left: 5px solid var(--accent); padding-left: 15px; margin-bottom: 25px; }

        /* Grid & Card */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .product-card { 
            background: var(--card); border-radius: 12px; overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.2s; display: flex; flex-direction: column;
        }
        .product-card:hover { transform: translateY(-5px); }

        /* Image Slider */
        .image-slider { width: 100%; height: 220px; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .image-slider::-webkit-scrollbar { display: none; }
        .image-slider img { min-width: 100%; height: 100%; object-fit: cover; scroll-snap-align: start; }

        .card-details { padding: 20px; flex-grow: 1; }
        .price { font-size: 1.3rem; color: var(--accent); font-weight: bold; }
        .btn-buy { background: var(--primary); color: white; border: none; padding: 12px; cursor: pointer; font-weight: bold; }

        footer { background: var(--primary); color: #bbb; padding: 40px 20px; text-align: center; margin-top: 50px; }
        .footer-links a { color: #fff; text-decoration: none; margin: 0 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <h1>THE OFF STORE</h1>
</header>

<div class="search-container">
    <input type="text" id="search-input" placeholder="Search for products or categories..." onkeyup="filterProducts()">
</div>

<div class="container" id="main-content">
    </div>

<footer>
    <div class="footer-links">
        <a href="privacy.html">Privacy Policy</a>
        <a href="returns.html">Return Policy</a>
        <a href="terms.html">Terms of Service</a>
        <a href="contact.html">Contact Us</a>
    </div>
    <p>&copy; 2026 The Off Store</p>
</footer>

<script src="products.js"></script>

<script>
function renderStore(filterText = "") {
    const mainContent = document.getElementById('main-content');
    mainContent.innerHTML = ""; // Clear current view
    
    storeData.categories.forEach(cat => {
        // Filter: Active items + Search Match
        const items = storeData.products.filter(p => 
            p.category === cat && 
            p.active && 
            p.name.toLowerCase().includes(filterText.toLowerCase())
        );

        if (items.length > 0) {
            const section = document.createElement('section');
            section.className = 'category-section';
            section.style.display = 'block';
            section.innerHTML = `<h2 class="category-title">${cat}</h2><div class="grid" id="grid-${cat.replace(/\s+/g, '')}"></div>`;
            mainContent.appendChild(section);

            const grid = document.getElementById(`grid-${cat.replace(/\s+/g, '')}`);
            items.forEach(product => {
                if (product.id === "AUTO") product.id = "PROD-" + Math.random().toString(36).substr(2, 6).toUpperCase();

                const validImages = product.images.filter(img => img !== "");
                const imageHtml = validImages.length > 0 
                    ? validImages.map(src => `<img src="${src}">`).join('')
                    : `<img src="https://via.placeholder.com/300x200?text=No+Image">`;

                grid.innerHTML += `
                    <div class="product-card">
                        <div class="image-slider">${imageHtml}</div>
                        <div class="card-details">
                            <small>${product.id}</small>
                            <h3>${product.name}</h3>
                            <p class="price">₹${product.price}</p>
                        </div>
                        <button class="btn-buy" onclick="alert('Order ID: ORD-${Date.now()}')">BUY NOW</button>
                    </div>`;
            });
        }
    });
}

function filterProducts() {
    const text = document.getElementById('search-input').value;
    renderStore(text);
}

// Initial Load
window.onload = () => renderStore();
</script>

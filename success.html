<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Placed | The Off Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }</style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full text-center space-y-8">
        
        <div class="flex justify-center">
            <div class="bg-green-100 text-green-600 w-24 h-24 rounded-[2.5rem] flex items-center justify-center text-5xl animate-bounce">
                ✓
            </div>
        </div>

        <div class="space-y-2">
            <h1 class="text-4xl font-black uppercase tracking-tighter">THANK YOU!</h1>
            <p class="text-gray-500 font-bold text-sm">Your order has been placed successfully.</p>
        </div>

        <div class="bg-white border rounded-[2.5rem] p-6 shadow-sm space-y-4">
            <div class="flex justify-between items-center border-b pb-4">
                <p class="text-[10px] font-black uppercase text-gray-400">Order ID</p>
                <p id="finalId" class="text-sm font-black text-blue-600 uppercase"></p>
            </div>
            <div class="text-left">
                <p class="text-[10px] font-black uppercase text-gray-400 mb-1">Status</p>
                <p class="text-xs font-bold text-gray-800 italic">Awaiting Payment Verification (Pan-India Dispatch)</p>
            </div>
        </div>

        <div class="space-y-4">
            <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Next Step</p>
            <button onclick="sendWhatsApp()" class="w-full bg-green-500 text-white py-5 rounded-full font-black text-lg uppercase tracking-widest shadow-xl shadow-green-100 active:scale-95 transition-all flex justify-center items-center gap-2">
                Confirm on WhatsApp
            </button>
            <button onclick="window.location.href='index.html'" class="text-[10px] font-black uppercase text-blue-600 tracking-widest py-2">Return to Shop</button>
        </div>

    </div>

    <script>
        // Get the last order details
        const history = JSON.parse(localStorage.getItem('orderHistory') || '[]');
        const lastOrder = history[history.length - 1];

        if(lastOrder) {
            document.getElementById('finalId').innerText = lastOrder.orderId;
        } else {
            window.location.href = 'index.html';
        }

        function sendWhatsApp() {
            const phone = "919090338150";
            const message = `Hi The Off Store! I just placed an order.\n\n🆔 ID: ${lastOrder.orderId}\n📦 Item: ${lastOrder.name}\n💰 Total: ₹${lastOrder.total}\n📍 Address: ${lastOrder.customerAddress}\n\nPlease confirm my payment!`;
            
            const encodedMessage = encodeURIComponent(message);
            window.location.href = `https://wa.me/${phone}?text=${encodedMessage}`;
        }
    </script>
</body>
</html>

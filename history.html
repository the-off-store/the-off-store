<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | The Off Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 p-6 font-['Inter']">
    <button onclick="window.location.href='index.html'" class="mb-6 font-black text-xs uppercase text-blue-600">← Back to Store</button>
    <h2 class="text-2xl font-black uppercase tracking-tighter mb-6">Order History</h2>
    <div id="historyList" class="space-y-4"></div>

    <script>
        const history = JSON.parse(localStorage.getItem('orderHistory') || '[]');
        const list = document.getElementById('historyList');

        if(history.length === 0) {
            list.innerHTML = `<p class="text-gray-400 font-bold text-sm">No orders found yet.</p>`;
        } else {
            history.reverse().forEach(item => {
                list.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl border shadow-sm">
                        <div class="flex justify-between items-start">
                            <span class="text-[9px] font-black bg-blue-100 text-blue-600 px-2 py-1 rounded-md uppercase">${item.id}</span>
                            <span class="text-[10px] font-bold text-gray-400">${item.date}</span>
                        </div>
                        <h4 class="font-bold text-sm mt-2 text-gray-800">${item.name} x ${item.qty}</h4>
                        <p class="text-blue-600 font-black mt-1">₹${item.total}</p>
                        <p class="text-[9px] font-bold text-orange-500 uppercase mt-2">Status: Awaiting Dispatch</p>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>

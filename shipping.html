<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipping & Returns | The Off Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-900">

    <header class="bg-white border-b px-6 py-4 flex items-center gap-4 sticky top-0 z-50">
        <button onclick="window.history.back()" class="bg-gray-100 rounded-full p-2 w-8 h-8 flex items-center justify-center text-sm">←</button>
        <div class="bg-black text-white px-2 py-1 rounded font-black text-xs italic">OFF</div>
        <h1 class="font-black text-xs tracking-widest uppercase">Policies</h1>
    </header>

    <main class="p-6 max-w-2xl mx-auto space-y-12 pb-20">
        
        <section class="space-y-4">
            <h2 class="text-4xl font-black tracking-tighter text-blue-600 uppercase">Shipping</h2>
            <div class="space-y-5 text-[13px] font-bold leading-relaxed text-gray-600">
                <div class="bg-white p-4 rounded-3xl border border-gray-100 shadow-sm">
                    <p class="text-black uppercase text-[10px] font-black mb-1">Pan-India Reach</p>
                    <p>We ship our emergency gear to all pin codes across India. Whether you are in a metro city or a rural area, we've got you covered.</p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-blue-50 p-4 rounded-3xl border border-blue-100 text-blue-900">
                        <p class="uppercase text-[9px] font-black mb-1">Odisha Delivery</p>
                        <p class="text-xs">2-3 Business Days</p>
                    </div>
